<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedalos Team Guides</title>
    <!-- Підключаємо іконку з папки images -->
    <link rel="icon" href="images/logo.png" type="image/png">
    <!-- Підключаємо стилі з папки css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Кнопка мобільного меню -->
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰ Меню</button>

    <div class="app-container">
        <!-- Ліва панель -->
        <aside class="sidebar">
<div class="sidebar-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Pedalos Team</h2>
        <!-- Кнопка перемикання теми -->
        <button id="theme-btn" class="theme-toggle-btn" onclick="toggleTheme()" title="Змінити тему">
            🌙
        </button>
    </div>
    
    <!-- Кнопка закриття меню (тільки для мобільних) -->
    <button class="close-menu-mobile" onclick="toggleMobileMenu(false)" style="float:right; background:none; border:none; color:var(--text-main); font-size:1.5rem; display:none;">✕</button>
</div>
            <nav id="role-list" class="nav-list"></nav>
        </aside>

        <!-- Головна область -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Оберіть мануал зліва</h1>
            </header>

            <div id="guides-grid" class="cards-grid"></div>
            <div id="static-content" class="static-page hidden"></div>
        </main>
    </div>

    <!-- Модальне вікно -->
    <div id="guide-modal" class="modal-overlay hidden">
        <div class="modal-window">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div class="modal-content" id="modal-body"></div>
        </div>
    </div>

    <!-- Підключаємо скрипти (спочатку дані, потім логіку) -->
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>

    <!-- Додатковий стиль для хрестика в меню на телефоні -->
    <style>
        @media (max-width: 768px) {
            .close-menu-mobile { display: block !important; }
        }
    </style>
</body>
</html>
