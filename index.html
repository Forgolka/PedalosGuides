<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ПРАВКА: Заголовок вкладки -->
    <title>Мануал ЧБ-Клінерів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Ліва панель -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <!-- ПРАВКА: Назва команди -->
                <h2>Pedalos Team</h2>
            </div>
            <nav id="role-list" class="nav-list">
                <!-- Сюди JS додасть: "Мануал Клінера", "Мануал Тайпера" і т.д. -->
            </nav>
        </aside>

        <!-- Головна область -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Оберіть мануал зліва</h1>
            </header>
            
            <div id="guides-grid" class="cards-grid">
                <!-- Картки розділів (Вступ, Інструменти) з'являться тут -->
            </div>
        </main>
    </div>

    <!-- Модальне вікно -->
    <div id="guide-modal" class="modal-overlay hidden">
        <div class="modal-window">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div class="modal-content" id="modal-body">
                <!-- Контент -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // БАЗА ДАНИХ (Оновлена структура)
        // ==========================================
        
        // Тут ми описуємо самі Ролі (щоб кнопки в меню гарно називалися)
        const rolesConfig = {
            'cleaner': 'Мануал Клінера',
            'typer': 'Мануал Тайпера (Beta)', // Приклад масштабування
            'translator': 'Мануал Перекладача (Beta)' // Приклад
        };

        const guidesData = [
            // --- ГАЙДИ ДЛЯ КЛІНЕРА ---
            {
                id: 1,
                role: 'cleaner', // ЦЕЙ ПАРАМЕТР ВИЗНАЧАЄ, В ЯКІЙ ВКЛАДЦІ БУДЕ ГАЙД
                title: "Вступ: Шлях Бусідо",
                category: "Основи",
                previewImage: "intro_preview.png", 
                content: [
                    // ПРАВКА: Заголовок у контенті
                    { type: 'header', text: "Мануал ЧБ-Клінерів" },
                    { type: 'text', text: "Вітаю тебе на шляху бусідо сучасності! Цей мануал створено, щоб спростити твоє навчання мистецтву ретуші чорно-білих сторінок." },
                    // ПРАВКА: Автори
                    { type: 'info', text: "Автори: Forgolka, Gemini 3 Pro" },
                    { type: 'subheader', text: "Зміст курсу:" },
                    { type: 'list', items: [
                        "Базові інструменти",
                        "Базові елементи (скрінтони, спідлайни)",
                        "Робота зі сканами",
                        "Операції (Actions)"
                    ]}
                ]
            },
            {
                id: 2,
                role: 'cleaner',
                title: "Базові інструменти",
                category: "Інструментарій",
                previewImage: "tools_preview.png",
                content: [
                    { type: 'header', text: "Базові інструменти Photoshop" },
                    { type: 'text', text: "Тут зібрані основні інструменти, необхідні для кліну. При наведенні курсору на інструмент у Photoshop відображається його гаряча клавіша." },
                    
                    { type: 'subheader', text: "Переміщення та Трансформація" },
                    { type: 'image', src: "tool_move.png", alt: "Інструмент переміщення" },
                    { type: 'text', text: "Використовується для копіювання елементів (через Alt) та їх переміщення." },
                    { type: 'text', text: "<b>Ctrl+T</b> — вмикає вільне трансформування (поворот, розтягування)." },

                    { type: 'subheader', text: "Виділення" },
                    { type: 'image', src: "tool_select.png", alt: "Інструменти виділення" },
                    { type: 'text', text: "Прямокутна область, Ласо, Чарівна паличка. Використовуються для обмеження робочої області або копіювання ділянок." },

                    { type: 'subheader', text: "Пензлі та Штамп" },
                    { type: 'image', src: "tool_brush.png", alt: "Пензель" },
                    { type: 'text', text: "Рекомендуємо змінити гарячу клавішу пензля на <b>A</b>. Використовуйте жорсткий круглий пензель та пензель з рваними краями." },
                    
                    { type: 'subheader', text: "Штамп (S)" },
                    { type: 'image', src: "tool_stamp.png", alt: "Штамп" },
                    { type: 'text', text: "Базовий інструмент. Затисніть Alt, щоб взяти зразок, і малюйте, щоб закрити текст або відновити фон." }
                ]
            },
             {
                id: 3,
                role: 'cleaner',
                title: "Скрінтони та Спідлайни",
                category: "Елементи",
                previewImage: "screentone_preview.png",
                content: [
                     { type: 'header', text: "Робота зі Скрінтонами" },
                    { type: 'text', text: "Скрінтони — це візерунки з крапок, що створюють ілюзію сірого кольору. Головне правило: якщо скрінтон дрібний, його можна замінити градієнтом. Якщо великий — треба відновлювати візерунок." },
                    { type: 'subheader', text: "Як відновлювати:" },
                    { type: 'list', items: [
                        "1. Затиснути Alt і вибрати зразок цілого скрінтону.",
                        "2. Зміститися на потрібну відстань.",
                        "3. Зафарбовувати, періодично відпускаючи кнопку миші."
                    ]},
                    { type: 'image', src: "screentone_example.png", alt: "Приклад скрінтону" },

                    { type: 'header', text: "Спідлайни (Лінії руху)" },
                    { type: 'text', text: "Лінії для передачі динаміки. Найпростіший спосіб — використовувати інструмент 'Лінія' в режимі пікселів." },
                    { type: 'image', src: "speedlines_example.png", alt: "Спідлайни" },
                    { type: 'text', text: "Алгоритм: Зафарбувати текст білим -> Виділити область -> Створити новий шар -> Малювати лінії інструментом Line Tool." }
                ]
            },
            {
                id: 4,
                role: 'cleaner',
                title: "Робота зі сканами",
                category: "Обробка",
                previewImage: "scans_preview.png",
                content: [
                    { type: 'header', text: "Підготовка сторінки (Levels)" },
                    { type: 'text', text: "Щоб зробити чорний колір насиченим, а білий — чистим без шуму, використовуємо 'Рівні' (Levels)." },
                    { type: 'list', items: [
                        "1. Переведіть зображення в режим Grayscale (Градації сірого).",
                        "2. Відкрийте Levels (Ctrl+L).",
                        "3. Підтягніть чорний повзунок (лівий) вправо, щоб затемнити тіні.",
                        "4. Підтягніть білий повзунок (правий) вліво, щоб прибрати 'бруд' на папері."
                    ]},
                    { type: 'image', src: "levels_settings.png", alt: "Налаштування рівнів" }
                ]
            },
            {
                id: 5,
                role: 'cleaner',
                title: "Операції (Actions)",
                category: "Автоматизація",
                previewImage: "actions_preview.png",
                content: [
                    { type: 'header', text: "Прискорення роботи" },
                    { type: 'text', text: "Операції дозволяють записати послідовність дій і виконувати їх однією кнопкою (наприклад, F2)." },
                    { type: 'subheader', text: "Корисні операції:" },
                    { type: 'list', items: [
                        "<b>Bubble Mask:</b> Швидке очищення баблу від сміття після виділення чарівною паличкою.",
                        "<b>Levels:</b> Автоматичне застосування налаштувань контрасту.",
                        "<b>Save & Close:</b> Збереження і закриття файлу."
                    ]},
                    { type: 'image', src: "actions_panel.png", alt: "Панель операцій" }
                ]
            },

            // --- ПРИКЛАД: ГАЙДИ ДЛЯ ТАЙПЕРА (Щоб показати, як це працює) ---
            {
                id: 101,
                role: 'typer',
                title: "Вступ до Тайпу",
                category: "Основи",
                previewImage: "",
                content: [
                    { type: 'header', text: "Мануал Тайпера" },
                    { type: 'text', text: "Тут буде гайд про шрифти." }
                ]
            }
        ];

        // ==========================================
        // ЛОГІКА РОБОТИ
        // ==========================================

        const gridContainer = document.getElementById('guides-grid');
        const modal = document.getElementById('guide-modal');
        const modalBody = document.getElementById('modal-body');
        const navList = document.getElementById('role-list');
        const pageTitle = document.getElementById('page-title');

        // 1. Рендер навігації (РОЛІ)
        function renderNav() {
            // Отримуємо унікальні ролі, які є в базі даних
            const availableRoles = [...new Set(guidesData.map(g => g.role))];
            
            availableRoles.forEach(roleKey => {
                const btn = document.createElement('div');
                btn.className = 'nav-item';
                // Беремо красиву назву з конфігу, або просто ключ, якщо назви немає
                btn.textContent = rolesConfig[roleKey] || roleKey;
                btn.onclick = () => selectRole(roleKey, btn);
                
                // Якщо це клінер, робимо активним за замовчуванням
                if (roleKey === 'cleaner') {
                    selectRole('cleaner', btn);
                }
                
                navList.appendChild(btn);
            });
        }

        // 2. Вибір ролі і рендер сітки
        function selectRole(roleKey, btnElement) {
            // Оновлюємо заголовок
            pageTitle.textContent = rolesConfig[roleKey];

            // Підсвітка активної кнопки в меню
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            else {
                // Якщо функція викликана вручну (при старті), шукаємо кнопку по тексту
                const btns = document.querySelectorAll('.nav-item');
                btns.forEach(b => {
                    if(b.textContent === rolesConfig[roleKey]) b.classList.add('active');
                });
            }

            // Фільтруємо гайди тільки для цієї ролі
            const roleGuides = guidesData.filter(g => g.role === roleKey);
            renderGrid(roleGuides);
        }

        // 3. Рендер карток
        function renderGrid(guides) {
            gridContainer.innerHTML = '';
            
            guides.forEach(guide => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openGuide(guide);
                
                const imgHtml = guide.previewImage 
                    ? `<img src="${guide.previewImage}" alt="${guide.title}" onerror="this.style.display='none'">` 
                    : `<div class="card-placeholder"></div>`;

                card.innerHTML = `
                    <div class="card-image">
                        ${imgHtml}
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${guide.title}</h3>
                        <span class="card-tag">${guide.category}</span>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // 4. Відкриття модального вікна
        function openGuide(guide) {
            modalBody.innerHTML = ''; 
            
            guide.content.forEach(block => {
                let element;
                if (block.type === 'header') {
                    element = document.createElement('h1');
                    element.textContent = block.text;
                } else if (block.type === 'subheader') {
                    element = document.createElement('h2');
                    element.textContent = block.text;
                } else if (block.type === 'text') {
                    element = document.createElement('p');
                    element.innerHTML = block.text;
                } else if (block.type === 'info') {
                    element = document.createElement('div');
                    element.className = 'info-box';
                    element.textContent = block.text;
                } else if (block.type === 'image') {
                    element = document.createElement('img');
                    element.src = block.src;
                    element.className = 'guide-img';
                    element.onerror = function() { this.src = "https://placehold.co/600x300?text=Зображення"; }
                } else if (block.type === 'list') {
                    element = document.createElement('ul');
                    block.items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        element.appendChild(li);
                    });
                }
                if (element) modalBody.appendChild(element);
            });

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Ініціалізація
        renderNav();
        // (Клінер вибирається автоматично всередині renderNav)

        modal.onclick = (e) => {
            if (e.target === modal) closeModal();
        }
    </script>
</body>
</html>
