<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedalosKopi1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; transition: background 0.3s; margin: 0; padding: 0; }
        body.light-theme { background-color: #f9fafb; color: #1f2937; }
        
        .app-card { background: #1f2937; border-radius: 12px; transition: background 0.3s; }
        body.light-theme .app-card { background: #ffffff; border: 1px solid #e5e7eb; }
        
        textarea { background: #111827 !important; border: 1px solid #374151 !important; color: #e5e7eb !important; }
        body.light-theme textarea { background: #f9fafb !important; border: 1px solid #d1d5db !important; color: #1f2937 !important; }
        
        .preview-img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid #4b5563; }
        body.light-theme .preview-img { border-color: #d1d5db; }
    </style>
</head>
<body class="p-4">

    <div class="app-card max-w-4xl mx-auto p-6 shadow-xl">
        <div class="flex items-center gap-3 mb-6">
            <div class="text-blue-500 text-3xl">✨</div>
            <h1 class="text-xl font-bold">PedalosKopi1.0</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
                <h2 class="font-semibold mb-2">Режим читання</h2>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="mode" value="manga" checked> Манґа</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="mode" value="manhwa"> Манхва</label>
                </div>
            </div>
            <!-- Сюди додано обробку Drag and Drop -->
            <div id="dropzone" class="border-2 border-dashed border-gray-500 rounded-lg p-4 text-center cursor-pointer hover:bg-gray-700 transition">
                <p class="text-sm">Натисніть або перетягніть файли</p>
                <input type="file" id="fileInput" multiple accept=".png, .jpg, .jpeg, .webp" class="hidden">
            </div>
        </div>

        <div id="photoGrid" class="flex flex-wrap gap-2 mb-6 min-h-[64px]"></div>

        <button id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg mb-6 transition">Видобути текст</button>
        
        <div id="resultsContainer" class="space-y-4"></div>
    </div>

    <script>
        // !!! ВАЖЛИВО: встав сюди реальну адресу свого Render-сервера !!!
        const RENDER_API_URL = "https://ТВІЙ-СЕРВЕР.onrender.com/process_single";
        const IS_API_CONFIGURED = !RENDER_API_URL.includes("ТВІЙ-СЕРВЕР");

        // --- СИНХРОНІЗАЦІЯ ТЕМИ ---
        function syncTheme() {
            try {
                if (window.parent.document.body.classList.contains('light-theme')) {
                    document.body.classList.add('light-theme');
                } else {
                    document.body.classList.remove('light-theme');
                }
            } catch (e) {
                // якщо iframe відкрито окремо (не всередині хабу) - просто ігноруємо
            }
        }
        try {
            new MutationObserver(syncTheme).observe(window.parent.document.body, { attributes: true, attributeFilter: ['class'] });
        } catch (e) { /* сторінка відкрита не в iframe хабу */ }
        syncTheme();

        // --- ЛОГІКА ФАЙЛІВ ТА DRAG AND DROP ---
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const submitBtn = document.getElementById('submitBtn');
        const submitBtnDefaultText = submitBtn.textContent;

        if (!IS_API_CONFIGURED) {
            const warn = document.createElement('p');
            warn.className = 'text-xs text-yellow-500 mt-2';
            warn.textContent = 'Увага: адреса сервера розпізнавання (RENDER_API_URL) ще не налаштована.';
            submitBtn.insertAdjacentElement('afterend', warn);
        }

        dropzone.onclick = () => fileInput.click();

        // Події для Drag and Drop
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('bg-gray-700'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('bg-gray-700'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('bg-gray-700');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';

            // Перебудовуємо список через DataTransfer - так input.files коректно
            // оновлюється і при виборі через діалог, і при перетягуванні файлів
            const dt = new DataTransfer();
            Array.from(files).forEach(file => dt.items.add(file));
            fileInput.files = dt.files;

            Array.from(dt.files).forEach(file => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = 'preview-img';
                grid.appendChild(img);
            });
        }

        // --- ОБРОБКА ---
        async function copyText(id) {
            const text = document.getElementById(`text-${id}`).value;
            await navigator.clipboard.writeText(text);
            alert('Скопійовано в буфер обміну!');
        }

        submitBtn.onclick = async () => {
            const files = fileInput.files;
            if (files.length === 0) return alert('Оберіть файли!');

            if (!IS_API_CONFIGURED) {
                return alert('Адреса сервера розпізнавання (RENDER_API_URL) ще не вказана в pedalos-kopi.html. Звернись до того, хто налаштовує сайт.');
            }

            const mode = document.querySelector('input[name="mode"]:checked').value;
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
            submitBtn.textContent = 'Обробка...';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const cardId = 'card-' + i;

                container.insertAdjacentHTML('beforeend', `
                    <div id="${cardId}" class="app-card p-4 border border-gray-700">
                        <div class="flex justify-between mb-2">
                            <span class="text-sm font-bold truncate">${file.name}</span>
                            <span class="text-xs text-blue-400">Обробка...</span>
                        </div>
                        <textarea id="text-${i}" class="w-full h-32 p-2 rounded text-sm"></textarea>
                        <button onclick="copyText('${i}')" class="mt-2 text-xs bg-gray-600 hover:bg-gray-500 px-3 py-1 rounded transition">Копіювати</button>
                    </div>
                `);

                const formData = new FormData();
                formData.append('file', file);
                formData.append('mode', mode);

                try {
                    const response = await fetch(RENDER_API_URL, { method: 'POST', body: formData });

                    if (!response.ok) {
                        throw new Error(`Сервер відповів помилкою ${response.status}`);
                    }

                    const data = await response.json();

                    if (data.success) {
                        document.getElementById(`text-${i}`).value = data.text;
                        document.querySelector(`#${cardId} .text-blue-400`).textContent = 'Готово';
                    } else {
                        document.getElementById(`text-${i}`).value = 'Помилка: ' + data.error;
                        document.querySelector(`#${cardId} .text-blue-400`).textContent = 'Помилка';
                    }
                } catch (err) {
                    document.getElementById(`text-${i}`).value = 'Помилка зв\'язку з сервером: ' + (err.message || 'сервер недоступний');
                    document.querySelector(`#${cardId} .text-blue-400`).textContent = 'Помилка';
                }
            }

            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-60', 'cursor-not-allowed');
            submitBtn.textContent = submitBtnDefaultText;
        };
    </script>
</body>
</html>
