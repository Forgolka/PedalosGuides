<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedalosKopi1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Підтримка темної теми через CSS змінні */
        body { background-color: #111827; color: #f3f4f6; transition: background 0.3s; }
        body.light-theme { background-color: #f9fafb; color: #1f2937; }
        
        .card-bg { background: #1f2937; }
        body.light-theme .card-bg { background: #ffffff; border: 1px solid #e5e7eb; }

        textarea { background: #111827 !important; color: #e5e7eb !important; }
        body.light-theme textarea { background: #f9fafb !important; color: #1f2937 !important; border-color: #d1d5db; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto card-bg rounded-xl shadow-lg p-8">
        <!-- Заголовок -->
        <div class="flex items-center gap-3 border-b border-gray-700 pb-4 mb-6">
            <div class="text-blue-500 text-3xl">✨</div>
            <div>
                <h1 class="text-2xl font-bold">PedalosKopi1.0</h1>
            </div>
        </div>

        <!-- Зона завантаження -->
        <div id="dropzone" class="border-2 border-dashed border-gray-600 rounded-lg p-6 text-center cursor-pointer mb-6">
            <p class="text-blue-400 font-medium">Перетягніть сторінки сюди</p>
            <input type="file" id="fileInput" multiple accept=".png, .jpg, .jpeg, .webp" class="hidden">
        </div>

        <!-- Візуальне відображення фото -->
        <div id="photoGrid" class="flex flex-wrap gap-2 mb-6"></div>

        <button id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg mb-6 transition">Видобути текст</button>
        
        <div id="resultsContainer" class="space-y-4"></div>
    </div>

    <script>
        // Перевірка теми з батьківського вікна (якщо в iframe)
        if (window.parent.document.body.classList.contains('light-theme')) {
            document.body.classList.add('light-theme');
        }

        function createCardHTML(id, filename, imageUrl) {
            return `
            <div class="card-bg p-4 rounded-lg border border-gray-700 shadow-md">
                <div class="flex justify-between items-center mb-3">
                    <span class="font-medium text-sm truncate">${filename}</span>
                    <button onclick="copyText('${id}')" class="text-xs bg-gray-600 hover:bg-gray-500 px-3 py-1 rounded transition">Копіювати</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <img src="${imageUrl}" class="h-48 object-contain bg-gray-800 rounded">
                    <textarea id="text-${id}" class="w-full h-48 p-2 rounded text-sm border focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
            </div>`;
        }

        function copyText(id) {
            const textArea = document.getElementById(`text-${id}`);
            textArea.select();
            document.execCommand('copy');
            alert('Скопійовано!');
        }

        // Візуалізація фото
        fileInput.addEventListener('change', (e) => {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            Array.from(e.target.files).forEach(file => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = 'w-16 h-16 object-cover rounded border border-gray-600';
                grid.appendChild(img);
            });
        });

        // ... (додай сюди логіку fetch з попереднього коду для обробки)
    </script>
</body>
</html>
